<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢字ビンゴ 教師用</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #0f0f23;
      color: #e8e8e8;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a4e, #2d2d7a);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #4444aa;
      box-shadow: 0 2px 12px rgba(0,0,80,0.5);
    }
    header h1 { font-size: 1.5rem; color: #fff; }
    header .badge { font-size: 0.75rem; background: #4444cc; color: #cce; padding: 4px 10px; border-radius: 12px; }

    .screen { display: none; }
    .screen.active { display: block; }

    /* 選択画面 */
    #screen-select { padding: 24px; max-width: 900px; margin: 0 auto; }
    .section-title { font-size: 1rem; color: #aaa; letter-spacing: 0.08em; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #333; }
    .group-section { margin-bottom: 32px; }
    .group-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .group-btn {
      background: #1e1e4a; border: 2px solid #3333aa; color: #ccd;
      padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 1rem;
      transition: all 0.2s; line-height: 1.3; font-family: inherit;
    }
    .group-btn:hover { background: #2a2a7a; border-color: #6688ff; color: #fff; transform: translateY(-2px); }
    .group-btn span { font-size: 0.72rem; color: #778; display: block; }

    /* 候補画面 */
    #screen-candidates { padding: 24px; max-width: 780px; margin: 0 auto; }
    .screen-heading { font-size: 1.3rem; margin-bottom: 6px; color: #ccf; }
    .screen-sub { font-size: 0.9rem; color: #888; margin-bottom: 20px; }

    .kanji-grid-15 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }

    .kanji-card {
      background: #1a1a4a; border: 2px solid #3344aa; border-radius: 10px;
      padding: 12px 6px 8px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .kanji-card:hover { border-color: #ff6655; background: #3a1a1a; }
    .kanji-card.removed { opacity: 0.25; border-style: dashed; }
    .kanji-card .kw { font-size: 1.8rem; line-height: 1.1; }
    .kanji-card .kr { font-size: 0.65rem; color: #88aadd; margin-top: 3px; }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { padding: 12px 22px; border-radius: 8px; font-size: 1rem; cursor: pointer; border: none; transition: all 0.2s; font-family: inherit; }
    .btn-secondary { background: #333; color: #ccc; }
    .btn-secondary:hover { background: #444; }
    .btn-primary { background: linear-gradient(135deg, #3355ff, #5577ff); color: #fff; }
    .btn-primary:hover { background: linear-gradient(135deg, #4466ff, #6688ff); }
    .btn-success { background: linear-gradient(135deg, #228855, #33aa77); color: #fff; font-size: 1.1rem; }
    .btn-success:hover { background: linear-gradient(135deg, #33aa77, #44cc88); }

    /* 提示画面 */
    #screen-present { padding: 24px; max-width: 900px; margin: 0 auto; }
    .instruction-box {
      background: #1a2244; border: 2px solid #3355aa; border-radius: 12px;
      padding: 16px 20px; margin-bottom: 20px; font-size: 1.1rem; color: #cce; line-height: 1.7;
    }
    .kanji-present-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
    .kanji-present-card {
      background: #1a1a4a; border: 2px solid #4455bb; border-radius: 12px;
      padding: 16px 6px 10px; text-align: center;
    }
    .kanji-present-card .kw { font-size: 2.4rem; font-weight: bold; color: #fff; line-height: 1.1; }
    .kanji-present-card .kr { font-size: 0.8rem; color: #99bbff; margin-top: 4px; }

    .free-toggle { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; font-size: 1rem; color: #aaa; }
    .toggle-switch { display: flex; background: #222; border-radius: 6px; overflow: hidden; border: 1px solid #444; }
    .toggle-option { padding: 6px 14px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .toggle-option.active { background: #3355aa; color: #fff; }

    /* ルーレット画面 */
    #screen-roulette { padding: 24px; max-width: 1000px; margin: 0 auto; }
    .roulette-layout { display: grid; grid-template-columns: 1fr 300px; gap: 24px; }

    .roulette-main { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .roulette-counter { font-size: 1rem; color: #888; }

    .roulette-display {
      width: 340px; height: 360px;
      background: linear-gradient(135deg, #1a1a5a, #2a2a7a);
      border: 4px solid #5566dd; border-radius: 20px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(80,100,255,0.4);
      padding: 16px;
      position: relative; overflow: hidden;
    }

    .roulette-display .r-word {
      font-size: 8rem; font-weight: bold; color: #fff;
      line-height: 1; text-shadow: 0 0 30px rgba(200,220,255,0.8);
      transition: opacity 0.08s;
    }
    .roulette-display .r-reading {
      font-size: 1.4rem; color: rgba(180,210,255,0.8); margin-top: 10px;
      min-height: 1.8rem; transition: opacity 0.3s;
    }

    .roulette-display.spinning .r-word { color: #aaccff; }
    .roulette-display.spinning .r-reading { opacity: 0; }

    .roulette-display.landed { border-color: #ffcc00; box-shadow: 0 0 60px rgba(255,200,0,0.5); }
    .roulette-display.landed .r-word {
      animation: landPop 0.5s ease-out;
      color: #fff;
    }
    @keyframes landPop {
      0%   { transform: scale(0.7); }
      60%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .roulette-display.empty .r-word { font-size: 3rem; color: #556; }

    .roulette-buttons { display: flex; gap: 12px; margin-top: 8px; }
    .btn-next {
      background: linear-gradient(135deg, #ff8800, #ffaa00); color: #000;
      font-size: 1.3rem; padding: 16px 36px; border-radius: 12px; cursor: pointer;
      border: none; font-weight: bold; font-family: inherit; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(255,150,0,0.4);
    }
    .btn-next:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255,150,0,0.6); }
    .btn-next:disabled { background: #444; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }

    .roulette-sidebar { background: #111130; border: 1px solid #333; border-radius: 12px; padding: 16px; }
    .sidebar-title { font-size: 0.9rem; color: #888; margin-bottom: 12px; }
    .drawn-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .drawn-item {
      background: #2a2a5a; border: 1px solid #4455aa; border-radius: 6px;
      padding: 6px 8px; text-align: center;
    }
    .drawn-item .di-word { font-size: 1.4rem; color: #aabbff; line-height: 1; }
    .drawn-item .di-read { font-size: 0.55rem; color: #778; }

    .finish-box {
      background: #112211; border: 2px solid #336633; border-radius: 12px;
      padding: 20px; text-align: center; margin-top: 16px;
    }
    .finish-box h3 { color: #66cc77; font-size: 1.3rem; margin-bottom: 8px; }
    .finish-box p { color: #888; font-size: 0.9rem; }

    @media (max-width: 700px) {
      .roulette-layout { grid-template-columns: 1fr; }
      .roulette-display { width: 280px; height: 300px; }
      .roulette-display .r-word { font-size: 6rem; }
      .kanji-grid-15, .kanji-present-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>🎯 漢字ビンゴ</h1>
  <span class="badge">教師用</span>
</header>

<!-- 選択画面 -->
<div id="screen-select" class="screen active">
  <div style="padding:24px; max-width:900px; margin:0 auto;">
    <div class="group-section">
      <p class="section-title">📚 学年で選ぶ</p>
      <div class="group-grid" id="grade-buttons"></div>
    </div>
    <div class="group-section">
      <p class="section-title">🔑 部首グループで選ぶ</p>
      <div class="group-grid" id="bushu-buttons"></div>
    </div>
    <div class="group-section">
      <p class="section-title">🌈 テーマグループで選ぶ</p>
      <div class="group-grid" id="theme-buttons"></div>
    </div>
  </div>
</div>

<!-- 候補画面 -->
<div id="screen-candidates" class="screen">
  <div style="padding:24px; max-width:780px; margin:0 auto;">
    <p class="screen-heading" id="candidates-title">候補漢字 15個</p>
    <p class="screen-sub">クリックで候補から外す・戻す。シャッフルで別の組み合わせに。</p>
    <div class="kanji-grid-15" id="candidates-grid"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="showScreen('select')">← 選び直す</button>
      <button class="btn btn-primary" onclick="shuffleCandidates()">🔀 シャッフル</button>
      <button class="btn btn-success" onclick="goToPresent()">子どもに見せる →</button>
    </div>
  </div>
</div>

<!-- 提示画面 -->
<div id="screen-present" class="screen">
  <div style="padding:24px; max-width:900px; margin:0 auto;">
    <div class="instruction-box">
      📝 下の漢字から好きな <strong>8個</strong> を選んで、ビンゴカードに書きましょう。<br>
      <span id="free-hint" style="font-size:0.9rem; color:#99aacc;">（真ん中マスは「フリー」です）</span>
    </div>
    <div class="kanji-present-grid" id="present-grid"></div>
    <div class="free-toggle">
      <span>真ん中マス：</span>
      <div class="toggle-switch">
        <div class="toggle-option active" id="toggle-free" onclick="setFreeCenter(true)">フリー</div>
        <div class="toggle-option" id="toggle-blank" onclick="setFreeCenter(false)">書き込む</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="showScreen('candidates')">← 候補に戻る</button>
      <button class="btn btn-success" onclick="goToRoulette()" style="font-size:1.1rem;padding:14px 28px;">
        🎲 ルーレット開始 →
      </button>
    </div>
  </div>
</div>

<!-- ルーレット画面 -->
<div id="screen-roulette" class="screen">
  <div style="padding:24px; max-width:1000px; margin:0 auto;">
    <div class="roulette-layout">
      <div class="roulette-main">
        <p class="roulette-counter" id="roulette-counter">残り 15個 / 15個</p>
        <div class="roulette-display empty" id="roulette-display">
          <div class="r-word" id="roulette-word">🎲</div>
          <div class="r-reading" id="roulette-reading"></div>
        </div>
        <div class="roulette-buttons">
          <button class="btn btn-secondary" onclick="showScreen('present')">← 戻る</button>
          <button class="btn-next" id="btn-next" onclick="drawNext()">次の漢字へ</button>
        </div>
        <div id="finish-box" style="display:none;" class="finish-box">
          <h3>🎉 すべて出ました！</h3>
          <p>ビンゴはどうでしたか？</p>
          <div style="margin-top:14px;">
            <button class="btn btn-primary" onclick="resetRoulette()">もう一度</button>
          </div>
        </div>
      </div>
      <div class="roulette-sidebar">
        <p class="sidebar-title">出た漢字（<span id="drawn-count">0</span>個）</p>
        <div class="drawn-list" id="drawn-list"></div>
      </div>
    </div>
  </div>
</div>

// ===========================
// アプリ状態
// ===========================
let selectedGroupName = '';
let selectedGroupKanji = [];
let candidates = []; // {word, reading}[]
let removedIndices = new Set();
let drawnKanji = [];
let remainingKanji = [];
let freeCenter = true;
let isSpinning = false;
let spinTimer = null;

// ===========================
// 初期化
// ===========================
function init() {
  const gradeDiv = document.getElementById('grade-buttons');
  const bushuDiv = document.getElementById('bushu-buttons');
  const themeDiv = document.getElementById('theme-buttons');

  Object.entries(KANJI_DATA.grades).forEach(([name, list]) => {
    gradeDiv.appendChild(makeGroupBtn(name, list));
  });
  Object.entries(KANJI_DATA.bushu).forEach(([name, list]) => {
    bushuDiv.appendChild(makeGroupBtn(name, list));
  });
  Object.entries(KANJI_DATA.themes).forEach(([name, list]) => {
    themeDiv.appendChild(makeGroupBtn(name, list));
  });
}

function makeGroupBtn(name, list) {
  const btn = document.createElement('button');
  btn.className = 'group-btn';
  btn.innerHTML = `${name}<span>${list.length}語</span>`;
  btn.onclick = () => selectGroup(name, list);
  return btn;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ===========================
// グループ選択
// ===========================
function selectGroup(name, kanjiList) {
  selectedGroupName = name;
  selectedGroupKanji = [...kanjiList];
  generateCandidates();
  document.getElementById('candidates-title').textContent = `候補 — ${name}`;
  renderCandidates();
  showScreen('candidates');
}

function generateCandidates() {
  const shuffled = [...selectedGroupKanji].sort(() => Math.random() - 0.5);
  candidates = shuffled.slice(0, Math.min(15, shuffled.length));
  removedIndices = new Set();
}

function shuffleCandidates() { generateCandidates(); renderCandidates(); }

function toggleCandidate(index) {
  if (removedIndices.has(index)) removedIndices.delete(index);
  else removedIndices.add(index);
  renderCandidates();
}

function renderCandidates() {
  const grid = document.getElementById('candidates-grid');
  grid.innerHTML = '';
  candidates.forEach((k, i) => {
    const card = document.createElement('div');
    card.className = 'kanji-card' + (removedIndices.has(i) ? ' removed' : '');
    card.innerHTML = `<div class="kw">${k.word}</div><div class="kr">${k.reading}</div>`;
    card.onclick = () => toggleCandidate(i);
    grid.appendChild(card);
  });
}

// ===========================
// 提示画面
// ===========================
function goToPresent() {
  const active = candidates.filter((_, i) => !removedIndices.has(i));
  if (active.length < 9) { alert('少なくとも9個必要です。'); return; }
  renderPresentGrid(active);
  showScreen('present');
}

function renderPresentGrid(list) {
  const grid = document.getElementById('present-grid');
  grid.innerHTML = '';
  list.forEach(k => {
    const card = document.createElement('div');
    card.className = 'kanji-present-card';
    card.innerHTML = `<div class="kw">${k.word}</div><div class="kr">${k.reading}</div>`;
    grid.appendChild(card);
  });
}

function setFreeCenter(val) {
  freeCenter = val;
  document.getElementById('toggle-free').classList.toggle('active', val);
  document.getElementById('toggle-blank').classList.toggle('active', !val);
  document.getElementById('free-hint').textContent = val
    ? '（真ん中マスは「フリー」です）'
    : '（真ん中マスも好きな漢字を書きましょう）';
}

// ===========================
// ルーレット
// ===========================
function goToRoulette() {
  const active = candidates.filter((_, i) => !removedIndices.has(i));
  drawnKanji = [];
  remainingKanji = [...active].sort(() => Math.random() - 0.5);
  isSpinning = false;

  document.getElementById('roulette-word').textContent = '🎲';
  document.getElementById('roulette-reading').textContent = '';
  document.getElementById('roulette-display').className = 'roulette-display empty';
  document.getElementById('drawn-list').innerHTML = '';
  document.getElementById('drawn-count').textContent = '0';
  document.getElementById('finish-box').style.display = 'none';
  document.getElementById('btn-next').disabled = false;
  updateCounter();
  showScreen('roulette');
}

function updateCounter() {
  const total = drawnKanji.length + remainingKanji.length;
  document.getElementById('roulette-counter').textContent =
    `残り ${remainingKanji.length}個 / ${total}個`;
}

function drawNext() {
  if (isSpinning || remainingKanji.length === 0) return;
  isSpinning = true;
  document.getElementById('btn-next').disabled = true;

  const target = remainingKanji.shift();
  const poolForSpin = candidates.filter(k => k.word !== target.word);

  const display = document.getElementById('roulette-display');
  const wordEl = document.getElementById('roulette-word');
  const readingEl = document.getElementById('roulette-reading');

  display.className = 'roulette-display spinning';
  wordEl.style.fontSize = '6rem';
  readingEl.textContent = '';

  const startTime = Date.now();
  const SPIN_MS = 2200;

  function getInterval(elapsed) {
    const prog = elapsed / SPIN_MS;
    if (prog < 0.55) return 65;
    const slow = (prog - 0.55) / 0.45;
    return 65 + slow * slow * 380;
  }

  function frame() {
    const elapsed = Date.now() - startTime;
    if (elapsed >= SPIN_MS) {
      // 着地
      display.className = 'roulette-display landed';
      wordEl.style.fontSize = '';
      wordEl.textContent = target.word;
      readingEl.textContent = target.reading;

      drawnKanji.push(target);
      addDrawnItem(target);
      updateCounter();

      if (remainingKanji.length === 0) {
        setTimeout(() => { document.getElementById('finish-box').style.display = 'block'; }, 700);
      } else {
        document.getElementById('btn-next').disabled = false;
      }
      isSpinning = false;
      return;
    }

    // スピン中：候補からランダム表示
    const src = poolForSpin.length > 0 ? poolForSpin : candidates;
    const rnd = src[Math.floor(Math.random() * src.length)];
    wordEl.textContent = rnd.word;

    spinTimer = setTimeout(frame, getInterval(elapsed));
  }

  frame();
}

function addDrawnItem(k) {
  const item = document.createElement('div');
  item.className = 'drawn-item';
  item.innerHTML = `<div class="di-word">${k.word}</div><div class="di-read">${k.reading}</div>`;
  document.getElementById('drawn-list').prepend(item);
  document.getElementById('drawn-count').textContent = drawnKanji.length;
}

function resetRoulette() { goToRoulette(); }

init();
</script>
